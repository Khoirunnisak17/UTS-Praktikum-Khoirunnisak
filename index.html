<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toko Buku Sayaa</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <h1>📚 Toko Buku Khoirunnisak 📚</h1>
    </header>

    <nav class="navbar">
      <div class="nav-container">
        <a href="#">Beranda</a>
        <a href="#produk">Produk</a>
        <a href="#form">Pembelian</a>
      </div>
    </nav>

    <main>
      <!-- HERO -->
      <section class="hero">
        <h2>Temukan Buku Favoritmu Disini</h2>
        <p>Buku berkualitas dengan harga terbaik👍</p>
      </section>

      <!-- PRODUK -->
      <section id="produk" class="produk-section">
        <h2>Daftar Buku Kami</h2>
        <div id="produk-list" class="produk-grid"></div>
      </section>

      <!-- FORM -->
      <section id="form" class="form-section">
        <h2>Form Pembelian</h2>

        <form id="formBuku" class="form-box">
          <div class="input-group">
            <label>Nama</label>
            <input type="text" id="nama" required />
            <small id="errNama"></small>
          </div>

          <div class="input-group">
            <label>Nomer Hp</label>
            <input type="text" id="Nomer Hp" required />
            <small id="errNomer Hp"></small>
          </div>

          <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" required />
            <small id="errEmail"></small>
          </div>

          <div class="input-group">
            <label>Jumlah Buku</label>
            <input type="number" id="jumlah" required />
            <small id="errJumlah"></small>
          </div>

          <div class="input-group">
            <label>Kategori</label>
            <select id="kategori">
              <option value="">Pilih</option>
              <option>Novel</option>
              <option>Komik</option>
              <option>Edukasi</option>
              <option>Teknologi</option>
            </select>
          </div>

          <div class="input-group">
            <label>Metode Pembayaran</label>
            <div class="radio-group">
              <label>
                <input type="radio" name="bayar" />
                COD
              </label>
              <label>
                <input type="radio" name="bayar" />
                Transfer
              </label>
            </div>
          </div>

          <button type="submit" class="btn">Beli Sekarang</button>
        </form>
      </section>
    </main>

    <footer class="footer">
      <p>2026 Toko Buku Sayaa</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
